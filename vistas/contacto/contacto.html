<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../../estilos/navbar.css">
    <link rel="stylesheet" href="../../estilos/footer.css">
    <link rel="icon" href="/media/flyway_logo.png">
    <link rel="stylesheet" href="./formulario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="contenedor">
        <form class="formulario" id="formularioContacto">
            <span class="form-header">
                <span class="title-header"> ¿Alguna pregunta? Contáctanos</span>
                <p class="description-header">Completa el formulario debajo para comunicarte con nosotros.</p>
            </span>
            <span class="form-data">
                <div class="row">
                    <article class="name-form">
                        <label for="name">Nombre Completo:</label>
                        <input type="text" placeholder="Juan Perez" name="name" required>
                    </article>

                    <article class="email-form">

                        <label for="email">Correo:</label>
                        <input type="email" placeholder="correo@proveedor.com" name="email" required>

                    </article>


                </div>

                <div class="row">
                    <article class="phone-form">

                        <label for="phone">Teléfono:</label>
                        <input type="text" placeholder="+54 (011) 1234 5678" name="phone" required>

                    </article>

                    <article class="subject-form">

                        <label for="subject">Asunto:</label>
                        <select name="subject" required>
                            <option>Problemas con mi vuelo</option>
                            <option>Reclamo de pagos</option>
                            <option>Hubo un problema con mi documentación</option>
                            <option>Quiero un reembolso</option>
                            <option>Equipaje perdido</option>
                            <option>Otro/a</option>
                        </select>
                    </article>
                </div>
            </span>
            <span class="form-message">
                <article class="message-form">
                    <label for="message">Mensaje:</label>
                    <textarea placeholder="Detalle su mensaje" name="message" required></textarea>
                </article>
            </span>

            <div class="submit-container">
                <button class="submit-button">Enviar</button>
            </div>
            <div class="mensaje hidden">
                <p class="aviso aviso-titulo">¡Mensaje enviado satisfactoriamente!</p>
                <p class="aviso aviso-subtitulo">Recibirás una respuesta en tu correo electrónico a la brevedad.</p>
            </div>

        </form>

    </main>



    <footer class="footer" id="footer">
    </footer>
    <script src="/componentes/navbar.js"></script>
    <script src="/componentes/footer.js"></script>

    <script>

        const formulario = document.getElementById('formularioContacto');

        const mensaje = document.querySelector('.mensaje');

        formulario.addEventListener('submit', function (evento) {
            evento.preventDefault();
            mensaje.style.display = 'flex';
        });

    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="../../estilos/navbar.css">
    <link rel="stylesheet" href="../../estilos/footer.css">
    <link rel="stylesheet" href="./login.css">
    <link rel="icon" href="/media/flyway_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <nav class="navbar" id="navbar">
    </nav>
    <main class="contenedor">
        <section class="contenido_principal">
            <form id="formLogin">

                <h2>Iniciar Sesión</h2>

                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>

                <a href="#" id="olvido-contrasena">¿Olvidaste tu contraseña?</a>

                <p id="mensajeError"></p>

                <button type="submit">Ingresar</button>

                <p>¿No tenés cuenta? <a href="../registrarse/registro.html">Registrarse</a></p>      

            </form>
        </section>
    </main>

    <footer class="footer" id="footer">
    </footer>

    <script src="./login.js"></script>
<script src="/componentes/navbar.js"></script>
<script src="/componentes/footer.js"></script>
</body>

</html>

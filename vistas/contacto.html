<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="../estilos/navbar.css">
    <link rel="stylesheet" href="../estilos/footer.css">
    <link rel="stylesheet" href="../estilos/contenedor.css">
    <link rel="stylesheet" href="../estilos/formulario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <ul class="nav-list">
                <img src="../media/flyway_logo.png" class="nav-logo" />
                <div class="vistas">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="../vistas/vuelos.html">Vuelos</a></li>
                    <li><a href="../vistas/ofertas.html">Ofertas</a></li>
                    <li><a href="../vistas/contacto.html" class="contenido-seleccionado">Contacto</a></li>
                </div>

            </ul>
        </div>
        <div class="nav-right">
            <ul class="nav-list">
                <div class="usuario">

                    <li class="log-in"><a href="#">Acceder</a></li>
                    <li><a href="#" class="sign-in">Comenzar ahora</a></li>
                </div>
            </ul>
        </div>
    </nav>

    <main class="contenedor">
        <form class="formulario">
            <span class="form-header">
                <span class="title-header"> ¿Alguna pregunta? Contáctanos</span>
                <p class="description-header">Completa el formulario debajo para comunicarte con nosotros.</p>
            </span>
            <span class="form-data">
                <div class="row">
                    <article class="name-form">
                        <label for="name">Nombre Completo:</label>
                        <input type="text" placeholder="Juan Perez" name="name" required>
                    </article>

                    <article class="email-form">

                        <label for="email">Correo:</label>
                        <input type="email" placeholder="correo@proveedor.com" name="email" required>

                    </article>


                </div>

                <div class="row">
                    <article class="phone-form">

                        <label for="phone">Teléfono:</label>
                        <input type="text" placeholder="+54 (011) 1234 5678" name="phone" required>

                    </article>

                    <article class="subject-form">

                        <label for="subject">Asunto:</label>
                        <select name="subject" required>
                            <option>Problemas con mi vuelo</option>
                            <option>Reclamo de pagos</option>
                            <option>Hubo un problema con mi documentación</option>
                            <option>Quiero un reembolso</option>
                            <option>Equipaje perdido</option>
                            <option>Otro/a</option>
                        </select>
                    </article>
                </div>
            </span>
            <span class="form-message">
                <article class="message-form">
                    <label for="message">Mensaje:</label>
                    <textarea placeholder="Detalle su mensaje" name="message" required></textarea>
                </article>
            </span>
            <button type="submit" class="submit-button">Enviar</button>
        </form>

    </main>
    <footer class="footer">
        <div class="contenedor_footer">
            <section class="redes_sociales">
                <i class="fa-brands fa-instagram logo"></i>
                <i class="fa-brands fa-square-x-twitter logo"></i>
                <i class="fa-brands fa-square-facebook logo"></i>
                <i class="fa-brands fa-linkedin logo"></i>
            </section>
            <section class="preguntas">
                <p><a href="./preguntas_frecuentes.html">Preguntas frecuentes</a></p>
                <p><a href="#">Términos y condiciones</a></p>
                <p><a href="#">Privacidad</a></p>
            </section>
        </div><hr>
        <div class="copyright">
            <p>&copy; 2026 Mi página web. Todos los derechos reservados.</p>
        </div>
    </footer>   

</body>

</html>

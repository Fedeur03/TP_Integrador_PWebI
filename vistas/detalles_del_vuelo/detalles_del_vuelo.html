<!DOCTYPE html>

<body>

    <nav class="navbar" id="navbar"></nav>
    <main class="contenedor">

        <h2>Detalle de Vuelo / Seleccioná tu Asiento</h2>

        <section class="grilla">

            <section class="caja">
                <h3>Detalle de Vuelo</h3>

                <div class="resultados">
                    <p>Ida: <span id="ruta"></span></p>
                    <div class="resultado-aerolinea">
                        <p class="hora-y-ciudad" id="hora-salida"></p>
                        <p class="hora-y-ciudad" id="ciudad-origen"></p>
                        <hr>
                        <i class="fa-solid fa-plane"></i>
                        <hr>
                        <p class="hora-y-ciudad" id="hora-llegada"></p>
                        <p class="hora-y-ciudad" id="ciudad-destino"></p>
                    </div>
                    <p class="duracion-mas-escala" id="duracion"></p>
                </div>

                <hr>

                <div class="resultado-aerolinea">
                    <p>Total</p>
                    <strong id="precio-total">$ --- USD</strong>
                </div>

                <hr>

               <p>Asientos: <span id="nombre-asiento">Ninguno</span></p>

               <hr>
                
                <div class="botones">
                    <a class="boton-checkout" onclick="validar(event)" href="../check_out/check_out.html">AVANZAR</a>
                    <a class="boton-volver" href="../resultados_busqueda/resultados.html">VOLVER</a>
                </div>

            </section>

            <section class="caja">
                <h3>Seleccioná tu Asiento</h3>

                <section class="referencias">
                    <i class="fa-solid fa-square disponible"></i> Disponible
                    <i class="fa-solid fa-square cuadrado ocupado"></i> Ocupado
                    <i class="fa-solid fa-square cuadrado seleccionado"></i> Seleccionado

                        <p>B</p>
                        <p>C</p>
                        <p>D</p>

                        <i class="fa-solid fa-couch disponible" onclick="elegirAsiento(this, 'A1')"></i>

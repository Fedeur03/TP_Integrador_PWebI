<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Vuelo</title>
    <link rel="stylesheet" href="../../estilos/navbar.css">
    <link rel="stylesheet" href="../../estilos/footer.css">
    <link rel="stylesheet" href="./detalles_del_vuelo.css">
    <link rel="icon" href="/media/flyway_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="../../scripts/verificarSesion.js"></script>
</head>

<body>

    <nav class="navbar" id="navbar"></nav>
    <main class="contenedor">
        <h2>Detalle de Vuelo / Seleccioná tu Asiento</h2>

        <section class="grilla" style="width:100%;">

            <form class="caja" style="width:100%;">
                <h3>Detalle de Vuelo</h3>

                <div class="resultados">
                    <span id="ruta"></span>

                    <div class="resultado-aerolinea">
                        <div class="bloque-vuelo">
                            <span class="ciudad-texto" id="ciudad-origen"></span>
                            <span class="hora-texto" id="hora-salida"></span>
                        </div>

                        <hr>
                        <i class="fa-solid fa-plane"></i>
                        <hr>

                        <div class="bloque-vuelo">
                            <span class="ciudad-texto" id="ciudad-destino"></span>
                            <span class="hora-texto" id="hora-llegada"></span>
                        </div>
                    </div>
                    <p class="duracion-mas-escala" id="fecha-del-vuelo">Fecha del vuelo: </p>
                    <p class="duracion-mas-escala" id="duracion"></p>

                </div>

                <hr>

                <div class="resultado-aerolinea" id="contenedor-pasajeros">
                    <p>Cantidad de asientos deseada:</p>

                    <select id="cantidad-pasajeros-select" required>
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>

                    <p>Clase:</p>
                    <select id="clase-select">
                        <option value="economica" selected>Económica</option>
                        <option value="ejecutiva">Ejecutiva</option>
                        <option value="primera">Primera Clase</option>
                    </select>
                </div>

                <hr>

                <p id="cantidad-pasajeros-texto"></p>
                <hr>
                <p id="clase-texto"></p>

                <hr>

                <div class="resultado-aerolinea">
                    <p>Total</p>
                    <strong id="precio-total">$ --- USD</strong>
                </div>

                <hr>

                <p>Asientos: <span id="nombre-asiento">Ninguno</span></p>

                <hr>
                <div class="opcionalVuelta" id="opcionalVuelta">
                    <div class="requiereVuelta" id="quiereVuelta">Incluir vuelta <input type="checkbox" id="vuelta"
                            name="vuelta"></div>
                    <hr>
                </div>

            </form>

            <section class="caja">
                <h3>Seleccioná tu Asiento</h3>

                <section class="referencias">
                    <i class="fa-solid fa-square disponible"></i> Disponible
                    <i class="fa-solid fa-square cuadrado ocupado"></i> Ocupado
                    <i class="fa-solid fa-square cuadrado seleccionado"></i> Seleccionado
                </section>

                <div class="mapa">

                    <div class="numeros">
                        <p></p>
                        <p>1</p>
                        <p>2</p>
                        <p>3</p>
                        <p>4</p>
                        <p>5</p>
                        <p>6</p>
                        <p>7</p>
                    </div>

                    <div class="grupo" id="asientos">
                        <p>A</p>
                        <p>B</p>
                        <p>C</p>
                        <p>D</p>
                    </div>

                    <div class="grupo" id="otros-asientos">
                        <p>E</p>
                        <p>F</p>
                        <p>G</p>
                        <p>H</p>
                    </div>
                </div>
                <div class="botones">
                    <a class="boton-checkout" id="continuar">AVANZAR</a>
                    <a class="boton-volver" href="../resultados_busqueda/resultados.html">VOLVER</a>
                </div>
                </div>

            </section>

        </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="/componentes/navbar.js"></script>
    <script src="/componentes/footer.js"></script>
    <script type="module" src="./detalles_del_vuelo.js"></script>
</body>

</html>

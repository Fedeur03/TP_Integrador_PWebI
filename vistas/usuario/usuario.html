<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="../../estilos/navbar.css">
    <link rel="stylesheet" href="../../estilos/footer.css">
    <link rel="stylesheet" href="./usuario.css">
    <link rel="icon" href="/media/flyway_logo.png">
    <script src="/scripts/verificarSesion.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="contenedor_reservas">
        <section class="lateral">
            <h1>Perfil</h1>
            <h2 class="seleccionado"><a class="link" href="../usuario/usuario.html">Información Personal</a></h2>
            <h2><a class="link" href="../mis_reservas/mis_reservas.html"> Vuelos Reservados</a>
            </h2>
        </section>

        <section class="contenido_secundario_reservas">
            <h1>Perfil</h1>
            <span class="categoria">Mis Datos </span> <button class="boton-documento" id="editar">Editar</button>
            
            <div class="contenedor_size">
                <div class="seccion-superior" id="datos-usuario">


                </div>

            </div>
            <span class="categoria">Mis Documentos</span>
            <div class="contenedor">
                <div id="documentos">

                </div>
            <form class="documento" id="form-documento">
                <span class="categoria">Nuevo Documento</span>
                <div class="sector-completar">
                    <div class="row">
                        <p class="label">Tipo de Documento</p>
                        <select id="tipo-documento"required>
                            <option value="dni">DNI</option>
                            <option value="pasaporte">Pasaporte</option>
                            <option value="licencia">Licencia de Conducir</option>
                            <option value="Libreta Cívica">Libreta Cívica</option>
                        </select>
                        <p class="label">Nro de Documento</p>
                        <input type="text" id="nro-documento" placeholder="12345678" required>
                    </div>
                    <div class="row">
                        <p class="label">Fecha de Vencimiento</p>
                        <input type="date" id="vencimiento" value="2025-01-01" required>
                        <p class="label">Fecha de Expedición</p>
                        <input type="date" id="expedicion" value="2020-01-01" required>

                    </div>

                    <div class="row">
                        <p class="label">País de Emisión</p>
                        <input type="text" id="pais-emision" placeholder="Argentina" required>
                        <p class="label">País de Residencia</p>
                        <input type="text" id="pais-residencia" placeholder="Argentina" required>


                    </div>

                    <div class="row_documento">

                        <p class="label">Subir Documento</p>
                        <label for="subir-archivo">Seleccione un documento</label>

                        <input type="file" name="subir-archivo" />

                        <p>Solo se aceptan documentos en formato PDF, JPG o PNG</p>

                    </div>

                    <div class="envio">
                        <button type="submit" class="boton-documento">
                            Guardar Documento
                        </button>
                    </div>
            </form>
            </div>

        </section>

    </main>

    <footer class="footer" id="footer">

    </footer>
    <script src="/componentes/navbar.js"></script>
    <script src="/componentes/footer.js"></script>
    <script src="usuario.js"></script>
</body>

</html>

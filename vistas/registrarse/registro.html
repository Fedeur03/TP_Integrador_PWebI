<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../../estilos/navbar.css">
    <link rel="stylesheet" href="../../estilos/footer.css">
    <link rel="stylesheet" href="./registro.css">
    <link rel="icon" href="/media/flyway_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <nav class="navbar" id="navbar"></nav>

    <main class="contenedor">
        <section class="contenido_principal">
            <form id="formRegistro">

                <h2>Registrarse</h2>

                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresar nombre" required>

                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingresar apellido" required>

                <label for="dni">DNI</label>
                <input type="text" id="dni" name="dni" placeholder="Ingresar DNI" maxlength="8" required>

                <label for="nacimiento">Fecha de nacimiento</label>
                <input type="date" id="nacimiento" name="nacimiento" placeholder="DD/MM/YYYY" required>

                <label for="pasaporte">Pasaporte</label>
                <input type="text" id="pasaporte" name="pasaporte" placeholder="Ingresar pasaporte" required>

                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>

                <p id="mensajeError"></p>

                <button type="submit">Crear cuenta</button>
                <button class="limpiar" type="reset">Limpiar</button>

                <p>¿Ya tenés cuenta? <a href="../iniciar_sesion/login.html">Iniciar Sesión</a></p>

            </form>
        </section>
    </main>

    <footer class="footer" id="footer">
    </footer>

    <script src="./registro.js"></script>
<script src="/componentes/navbar.js"></script>
<script src="/componentes/footer.js"></script>
</body>

</html>

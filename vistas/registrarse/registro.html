<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../../estilos/navbar.css">
    <link rel="stylesheet" href="../../estilos/footer.css">
    <link rel="stylesheet" href="../estilos/contenedor.css">
    <link rel="stylesheet" href="./registro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <span class="nav-logo">LOGO</span>
        <ul class="nav-list">
            <div class="vistas">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../vistas/vuelos.html">Vuelos</a></li>
                <li><a href="../vistas/ofertas.html">Ofertas</a></li>
                <li><a href="../vistas/contacto.html">Contacto</a></li>
            </div>
            <div class="usuario">
                <li><a href="../iniciar_sesion/login.html">Iniciar Sesión</a></li>
                <li><a href="registro.html" class="contenido-seleccionado">Registro</a></li>
            </div>
        </ul>
    </nav>

    <main class="contenedor">
        <section class="contenido_principal">
            <form action="../index.html">

                <h2>Registrarse</h2>

                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresar nombre" required>

                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingresar apellido" required>

                <label for="dni">DNI</label>
                <input type="text" id="dni" name="dni" placeholder="Ingresar DNI" maxlength="8" required>

                <label for="nacimiento">Fecha de nacimiento</label>
                <input type="text" id="nacimiento" name="nacimiento" placeholder="DD/MM/YYYY" required>

                <label for="pasaporte">Pasaporte</label>
                <input type="text" id="pasaporte" name="pasaporte" placeholder="Ingresar pasaporte">

                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>

                <button type="submit">Crear cuenta</button>
                <button class= "limpiar" type="reset">Limpiar</button>

                <p>¿Ya tenés cuenta? <a href="../iniciar_sesion/login.html">Iniciar Sesión</a></p>

            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="contenedor_footer">
            <section class="redes_sociales">
                <i class="fa-brands fa-instagram logo"></i>
                <i class="fa-brands fa-square-x-twitter logo"></i>
                <i class="fa-brands fa-square-facebook logo"></i>
                <i class="fa-brands fa-linkedin logo"></i>
            </section>
            <section class="preguntas">
                <p><a href="./vistas/preguntas_frecuentes.html">Preguntas frecuentes</a></p>
                <p><a href="#">Términos y condiciones</a></p>
                <p><a href="#">Privacidad</a></p>
            </section>
        </div>
        <hr>
        <div class="copyright">
            <p>&copy; 2026 Mi página web. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../actividad2/styles.css">
    <title>Contacto</title>

</head>
<body>
    <nav>
        <li class="button"> <a href="../actividad2/index.html">Back</a></li>
        <li class="button"> <a href="../actividad2/contacto.html">Contacto</a></li>
    </nav>
    <main>
        <h1>Contacto</h1>
        <p>Si deseas ponerte en contacto conmigo, tienes que rellenar el siguiente formulario:</p>
        <form>
            <label for="nombre">Nombre:</label>
            <input class="form-area" type="text" id="nombre" name="nombre" required>

            <label for="email">Email:</label>
            <input class="form-area" type="email" id="email" name="email" required>

            <label for="telefono">Teléfono:</label>
            <input class="form-area" type="tel" id="telefono" name="telefono">
            <label for="mensaje">Mensaje:</label>
            <textarea class="form-area-mensaje" id="mensaje" name="mensaje" rows="5" required></textarea>

            <button class="button" type="button">Enviar</button>
        </form>
    </main>
    <footer>

    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="../../estilos/navbar.css">
    <link rel="stylesheet" href="../../estilos/footer.css">
    <link rel="stylesheet" href="../../estilos/index.css">
    <link rel="icon" href="/media/flyway_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="banner">
        <img src="../../media/banner-inicio.png" alt="Banner">
    </div>

    <main class="contenedor">

        <section class="contenido_buscar_vuelo">

            <h1>Buscá tu vuelo ideal</h1><br>

            <form class="buscador" id="formBusqueda" action="/vistas/resultados_busqueda/resultados.html">

                <div class="tipo_vuelo">
                    <label><input type="radio" name="viaje" required> Ida y vuelta</label>
                    <label><input type="radio" name="viaje"> Solo ida</label>
                </div>

                <div class="fila">
                    <label><span class="categoria"><i class="fa-solid fa-plane-departure"></i>Origen</span>
                        <input type="text" id="origen" placeholder="EZE - Buenos Aires" required>
                    </label>
                    <label><span class="categoria"><i class="fa-solid fa-plane-arrival"></i>Destino</span>
                        <input type="text" id="destino" placeholder="MAD - Madrid" required>
                    </label>
                </div>

                <div class="fila">
                    <label><span class="categoria"><i class="fa-solid fa-calendar"></i>Ida</span>
                        <input type="date" id="fechaIda" required>
                    </label>
                    <label><span class="categoria"><i class="fa-solid fa-calendar"></i>Vuelta</span>
                        <input type="date" id="fechaVuelta" required>
                    </label>
                </div>

                <div class="fila">
                    <label><span class="categoria"><i class="fa-solid fa-people-group"></i>Pasajeros</span>
                        <select id="pasajeros">
                            <option>1 Pasajero</option>
                            <option>2 Pasajeros</option>
                            <option>3 Pasajeros</option>
                            <option>4 Pasajeros</option>
                            <option>5 Pasajeros</option>
                            <option>6 Pasajeros</option>
                        </select>
                    </label>
                    <label><span class="categoria"><i class="fa-solid fa-layer-group"></i>Clase</span>
                        <select id="clase">
                            <option>Económica</option>
                            <option>Ejecutiva</option>
                            <option>Primera Clase</option>
                        </select>
                    </label>
                </div>

                <p id="mensajeError"></p>

                <button class="boton_buscar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Buscar vuelos
                </button>

            </form>

        </section>

    </main>

    <footer class="footer" id="footer">
        
    </footer>

    <script src="./index.js"></script>
    <script src="/componentes/navbar.js"></script>
    <script src="/componentes/footer.js"></script>

</body>

</html>
